        padding: 2rem;

        height: auto;

        margin-bottom: 1.5rem;
        filter: drop-shadow(0 0 24px rgba(223, 231, 164, 0.35));

      .eyebrow {
        font-family: "Source Code Pro", monospace;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 1rem;
      }
      .wordmark {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.25rem;
        letter-spacing: -0.01em;

        margin-bottom: 0.75rem;
      }

        font-weight: 700;

        line-height: 1.05;
        letter-spacing: -0.02em;
        margin-bottom: 1.25rem;
      }
      h1 .accent {

      }
      .lede {
        font-size: 1.125rem;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 auto 2.25rem;
        max-width: 34rem;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: "Source Code Pro", monospace;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        color: var(--bg);
        background: var(--primary);
        padding: 0.85rem 1.5rem;
        border-radius: 0.625rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 8px 30px rgba(223, 231, 164, 0.18);
      }
      .cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(223, 231, 164, 0.28);
      }
      .links {
        margin-top: 1.5rem;
        font-family: "Source Code Pro", monospace;
        font-size: 0.85rem;
      }
      .links a {
        color: var(--muted);
        text-decoration: none;
        margin: 0 0.6rem;
        transition: color 0.15s ease;
      }
      .links a:hover {
        color: var(--fg);
      }
      footer {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: var(--muted);
        opacity: 0.7;
      }
